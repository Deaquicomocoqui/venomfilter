<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}VenomFilter{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" style="text-decoration:none">
        <span class="nav-logo">
          <span class="nav-logo-icon">🛡</span>
          VenomFilter
        </span>
      </a>
      <span class="nav-badge">Email Threat Analyzer</span>
    </div>
  </nav>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Running threat analysis…</div>
    <div class="loading-sub">Checking headers · sender reputation · URLs · attachments</div>
  </div>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
